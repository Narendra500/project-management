services:
  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server
  server:
    build: ./server
    container_name: server
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  postgres:
    image: postgis/postgis:17-3.5
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: naku
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    external: true
